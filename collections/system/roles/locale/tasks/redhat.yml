---
- name: Locale >> RedHat | Check system locale
  tags: [locale]
  register: locale_output
  changed_when: false
  ansible.builtin.command:
    cmd: localectl --no-pager status

- name: Locale >> RedHat | Set system locale
  become: true
  tags: [locale]
  when: "'LANG=' + locale_value not in locale_output.stdout"
  changed_when: true
  ansible.builtin.command:
    cmd: localectl set-locale LANG="{{ locale_value }}"
