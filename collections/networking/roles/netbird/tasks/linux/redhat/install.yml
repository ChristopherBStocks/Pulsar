---
- name: NetBird >> RedHat | Validate setup key
  ansible.builtin.assert:
    that: netbird_setup_key | length > 0
    fail_msg: "netbird_setup_key must be set"

- name: NetBird >> RedHat | Add repository
  become: true
  tags: [netbird, install]
  ansible.builtin.yum_repository:
    name: netbird
    description: NetBird
    baseurl: https://pkgs.netbird.io/yum/
    enabled: true
    gpgcheck: true
    repo_gpgcheck: true
    gpgkey: https://pkgs.netbird.io/yum/repodata/repomd.xml.key

- name: NetBird >> RedHat | Install package
  become: true
  tags: [netbird, install]
  ansible.builtin.dnf:
    name: netbird
    state: present
  notify: NetBird | Activate

- name: NetBird >> RedHat | Check registration
  become: true
  tags: [netbird, install]
  register: netbird_status
  changed_when: false
  failed_when: false
  ansible.builtin.command:
    cmd: netbird status

- name: NetBird >> RedHat | Register setup key
  become: true
  tags: [netbird, install]
  when: "'Management: Connected' not in netbird_status.stdout"
  changed_when: true
  ansible.builtin.command:
    cmd: netbird up --setup-key {{ netbird_setup_key }}
  no_log: true
